<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通流量预测与小建议</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/echarts.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei",Arial,sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg,#0a4fa6,#0077cc,#00a8e8);
            padding: 24px 16px 40px;
        }

        /* 顶部导航 */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .topbar h1 { color:#fff; font-size:20px; font-weight:700; }
        .topbar h1 i { margin-right:8px; }
        .btn-back {
            color:#fff; text-decoration:none; font-size:14px;
            background:rgba(255,255,255,.15); padding:7px 16px;
            border-radius:20px; transition:background .2s;
        }
        .btn-back:hover { background:rgba(255,255,255,.28); }

        /* 主内容区 */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
        }

        /* 卡片 */
        .card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,.15);
            padding: 20px 22px;
        }
        .card-title {
            font-size: 14px; font-weight: 700; color: #1a1a2e;
            margin-bottom: 14px; padding-bottom: 9px;
            border-bottom: 2px solid #f0f4ff;
            display: flex; align-items: center; gap: 8px;
        }
        .card-title i { color: #007bff; }

        /* 表单组 */
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 13px; color: #555;
            margin-bottom: 4px; font-weight: 600;
        }
        .form-group select,
        .form-group input {
            width: 100%; padding: 8px 11px;
            border: 1.5px solid #dde3ec; border-radius: 8px;
            font-size: 13px; color: #333; background: #f7f9fc;
            outline: none; transition: border-color .2s, box-shadow .2s;
        }
        .form-group select:focus,
        .form-group input:focus {
            border-color: #007bff; background: #fff;
            box-shadow: 0 0 0 3px rgba(0,123,255,.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* 自动推断标签 */
        .auto-badge {
            display: inline-block; font-size: 11px; color: #007bff;
            background: #e8f4ff; border-radius: 4px; padding: 1px 6px;
            margin-left: 6px; font-weight: 400;
        }

        /* 提交按钮 */
        .btn-predict {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg,#007bff,#0056e0);
            color: #fff; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            margin-top: 4px;
            box-shadow: 0 4px 15px rgba(0,123,255,.4);
            transition: opacity .2s, transform .15s;
        }
        .btn-predict:hover { opacity:.9; transform:translateY(-1px); }
        .btn-predict:active { transform:translateY(0); }
        .btn-predict:disabled { opacity:.6; cursor:not-allowed; }

        /* 结果区 */
        .result-panel { display:none; margin-top:16px; }
        .result-panel.show { display:block; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 20px; font-weight: 800;
            padding: 9px 18px; border-radius: 10px;
            color: #fff; margin-bottom: 10px;
        }
        .result-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; margin-bottom: 10px;
        }
        .result-item {
            background: #f7f9fc; border-radius: 8px;
            padding: 10px 12px;
        }
        .result-item .ri-label { font-size:12px; color:#888; margin-bottom:3px; }
        .result-item .ri-value { font-size:18px; font-weight:700; color:#1a1a2e; }

        .guidance-box {
            background: #fff8e1; border-left: 4px solid #ffc107;
            border-radius: 6px; padding: 10px 12px;
            font-size: 13px; color: #5a4000; line-height: 1.6;
        }
        .guidance-box.ok     { background:#f0fff4; border-color:#28a745; color:#1a4a2e; }
        .guidance-box.warn   { background:#fff8e1; border-color:#ffc107; color:#5a4000; }
        .guidance-box.danger { background:#fff3e0; border-color:#fd7e14; color:#5a2a00; }
        .guidance-box.crit   { background:#fff2f2; border-color:#dc3545; color:#6a0000; }

        /* 右侧图表区 */
        .chart-col { display: flex; flex-direction: column; gap: 16px; }

        /* 图表占位符 */
        .chart-placeholder {
            display: flex; align-items: center; justify-content: center;
            height: 280px; color: #aaa; font-size: 13px;
            flex-direction: column; gap: 8px;
        }

        /* ─── 自定义时间选择器 ─── */
        .tp-bar {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 10px;
        }
        .tp-tab {
            padding: 5px 15px; border-radius: 16px; border: none; cursor: pointer;
            font-size: 13px; font-weight: 700;
            background: #eef2ff; color: #666; transition: all .2s;
        }
        .tp-tab.active { background: #007bff; color: #fff; box-shadow: 0 2px 8px rgba(0,123,255,.35); }
        .tp-legend {
            margin-left: auto; display: flex; align-items: center;
            gap: 5px; font-size: 11px; color: #999;
        }
        .tp-legend-bar {
            width: 72px; height: 7px; border-radius: 4px;
            background: linear-gradient(to right, #52c41a, #faad14, #fa8c16, #f5222d);
        }
        .tp-display {
            font-size: 12px; color: #007bff; font-weight: 600;
            padding: 5px 10px; background: #f0f7ff; border-radius: 6px;
            margin-bottom: 8px;
        }
        .tp-row {
            display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
        }
        .tp-row-lbl {
            font-size: 11px; color: #999; width: 26px; flex-shrink: 0;
        }
        .tp-days { display: flex; gap: 3px; flex: 1; }
        .tp-day {
            flex: 1; padding: 4px 2px; text-align: center;
            border: none; border-radius: 6px; cursor: pointer;
            font-size: 11px; background: #f0f4ff; color: #333;
            transition: all .18s; line-height: 1.4;
        }
        .tp-day.selected  { background: #007bff; color: #fff; font-weight: 700; }
        .tp-day.disabled  { color: #ccc; background: #fafafa; cursor: not-allowed; }
        .tp-slider-wrap   { flex: 1; }
        .tp-hour-marks {
            display: flex; justify-content: space-between;
            font-size: 10px; color: #bbb; padding: 1px 2px 0;
        }
        #tpSlider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 5px; border-radius: 3px; outline: none;
            background: linear-gradient(to right,
                #007bff 0%, #007bff calc(var(--pct, 0%) ),
                #dde3ec calc(var(--pct, 0%) ), #dde3ec 100%);
        }
        #tpSlider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: #007bff; border-radius: 50%; cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,123,255,.45);
        }
        #tpSlider:disabled { opacity: .4; cursor: not-allowed; }

        /* ECharts 容器 */
        #trendChart   { width:100%; height:280px; display:none; }
        #heatmapChart { width:100%; height:280px; display:none; }
        /* Loading spinner */
        .spinner {
            display: none; width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,.4);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 预测结果仪表盘样式 */
        .prediction-dashboard {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            margin-top: 10px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e9ecef;
        }
        .dashboard-header h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prediction-time {
            font-size: 13px;
            color: #666;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 6px;
        }
        .dashboard-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        @media (max-width: 768px) {
            .dashboard-content {
                grid-template-columns: 1fr;
            }
        }
        .gauge-container {
            position: relative;
            margin-bottom: 15px;
        }
        .gauge-label {
            text-align: center;
            margin-top: 10px;
        }
        .gauge-title {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .gauge-value {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
        }
        .congestion-levels {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .level-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            border-radius: 8px;
            background: #f8f9fa;
            transition: all 0.2s;
            cursor: pointer;
        }
        .level-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        .level-item.active {
            background: #e8f4ff;
            box-shadow: 0 2px 8px rgba(0,123,255,0.15);
        }
        .level-color {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-bottom: 5px;
        }
        .level-text {
            font-size: 12px;
            color: #333;
            font-weight: 500;
        }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .metric-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.2s;
        }
        .metric-card:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        .metric-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .metric-header i {
            color: #007bff;
            font-size: 14px;
        }
        .metric-header span {
            font-size: 13px;
            color: #555;
            font-weight: 600;
        }
        .metric-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .metric-trend {
            font-size: 11px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .metric-trend i {
            font-size: 10px;
        }
        .confidence-container {
            margin-bottom: 8px;
        }
        .confidence-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #ffc107, #fd7e14, #dc3545);
            border-radius: 4px;
            transition: width 1s ease-out;
        }
        .confidence-value {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: right;
        }
        .confidence-label {
            font-size: 11px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-badge-mini {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            color: white;
            font-size: 11px;
            font-weight: 500;
            margin-top: 5px;
        }
        .guidance-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .section-header i {
            color: #ffc107;
            font-size: 16px;
        }
        .section-header span {
            font-size: 15px;
            color: #1a1a2e;
            font-weight: 600;
        }
        .guidance-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            flex: 1;
            padding: 8px 12px;
            background: #e9ecef;
            border: 1px solid #ced4da;
            border-radius: 6px;
            color: #495057;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .action-btn:hover {
            background: #dee2e6;
            border-color: #adb5bd;
        }
        .action-btn i {
            font-size: 12px;
        }

        /* 图表选项卡样式 */
        .chart-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            background: #fff;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .chart-tab {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #f8f9fa;
            color: #666;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .chart-tab:hover {
            background: #e9ecef;
            transform: translateY(-1px);
        }
        .chart-tab.active {
            background: #007bff;
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,123,255,0.3);
        }
        .chart-tab i {
            font-size: 14px;
        }
        .chart-tab-content {
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .chart-tab-content.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }
        /* 预测结果图表容器 */
        #predictionChart1, #predictionChart2 {
            width: 100%;
            height: 280px;
            display: none;
        }
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 响应式设计优化 */
        @media (max-width: 768px) {
            .chart-tabs {
                flex-direction: column;
                gap: 6px;
            }
            .chart-tab {
                padding: 8px 12px;
                font-size: 12px;
            }
            .chart-tab i {
                font-size: 12px;
            }
            .card-title {
                font-size: 13px;
            }
        }

        /* 基本状态展示样式 */
        .basic-status {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .status-label {
            font-size: 13px;
            color: #666;
            font-weight: 600;
        }
        .status-value {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            padding: 4px 12px;
            border-radius: 6px;
            background: #f8f9fa;
        }
        .status-time {
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            padding: 4px 10px;
            border-radius: 6px;
            margin-left: auto;
        }
        .status-actions {
            text-align: center;
        }
        .action-btn-small {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn-small:hover {
            background: #0056e0;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,123,255,0.3);
        }
        .action-btn-small i {
            font-size: 12px;
        }
    </style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
    <h1><i class="fas fa-chart-line"></i>交通流量预测与疏导建议</h1>
    <a href="{{ url_for('index') }}" class="btn-back">
        <i class="fas fa-arrow-left"></i> 返回主页
    </a>
</div>

<div class="main">
    <!-- ══════════════ 左侧：输入表单 ══════════════ -->
    <div>
        <div class="card">
            <div class="card-title">
                <i class="fas fa-sliders"></i> 预测参数设置
            </div>

            <!-- 道路选择 -->
            <div class="form-group">
                <label><i class="fas fa-road"></i> 道路名称</label>
                <select id="road">
                    <option value="">-- 请选择道路 --</option>
                    {% for r in road_list %}
                    <option value="{{ r }}">{{ r }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- 自定义时间选择器 -->
            <div class="form-group">
                <label><i class="fas fa-calendar-clock"></i> 预测时间</label>

                <!-- 拥堵图例 -->
                <div class="tp-bar">
                    <span style="font-size:12px;color:#555;font-weight:600;">拥堵参考：</span>
                    <div class="tp-legend">
                        畅通 <div class="tp-legend-bar"></div> 拥堵
                    </div>
                </div>

                <!-- 预测面板 -->
                <div id="forecastPanel">
                    <!-- 当前选中时间显示 -->
                    <div class="tp-display">
                        预测时间 &nbsp;
                        <span id="tpDisplay">--</span>
                        <span class="auto-badge" id="weatherLoadBadge" style="display:none;background:#fff3e0;color:#e67e00;margin-left:6px;">
                            <i class="fas fa-spinner fa-spin"></i> 获取天气...
                        </span>
                    </div>

                    <!-- 星期选择行 -->
                    <div class="tp-row">
                        <span class="tp-row-lbl">星期</span>
                        <div class="tp-days" id="tpDayBtns"></div>
                    </div>

                    <!-- 小时滑块行 -->
                    <div class="tp-row">
                        <span class="tp-row-lbl">时间</span>
                        <div class="tp-slider-wrap">
                            <input type="range" id="tpSlider" min="0" max="23" step="1"
                                   oninput="onSliderChange()" style="--pct:0%">
                            <div class="tp-hour-marks">
                                <span>00</span><span>08</span><span>16</span><span>24</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 隐藏 input 保持与其他函数兼容 -->
                <input type="hidden" id="datetime">
            </div>

            <!-- 天气 -->
            <div class="form-group">
                <label>
                    <i class="fas fa-cloud-sun"></i> 天气状况
                    <span class="auto-badge" id="weatherSourceBadge" style="display:none;"></span>
                </label>
                <select id="weather">
                    {% for w in options.get('weather', []) %}
                    <option value="{{ w }}">{{ w }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- 温度 & 湿度 -->
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-temperature-half"></i> 温度（℃）</label>
                    <input type="number" id="temperature" value="20" min="-10" max="45" step="0.5">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-droplet"></i> 湿度（%）</label>
                    <input type="number" id="humidity" value="70" min="10" max="100">
                </div>
            </div>

            <!-- 季节 & 时段：自动推断，不显示给用户 -->
            <input type="hidden" id="season" value="spring">
            <input type="hidden" id="time_period" value="night">

            <button class="btn-predict" id="predictBtn" onclick="doPredict()">
                <span id="btnText"><i class="fas fa-magnifying-glass-chart"></i> 开始预测</span>
                <div class="spinner" id="spinner"></div>
            </button>

        <!-- 结果展示（简化版，只显示基本状态） -->
        <div class="result-panel" id="resultPanel">
            <hr style="margin:14px 0;border-color:#eee;">
            
            <!-- 基本状态展示 -->
            <div class="basic-status">
                <div class="status-indicator">
                    <div class="status-label">预测状态：</div>
                    <div class="status-value" id="basicStatusValue">--</div>
                    <div class="status-time" id="basicPredictionTime"></div>
                </div>
                <div class="status-actions">
                    <button class="action-btn-small" onclick="switchChartTab('dashboard')">
                        <i class="fas fa-chart-bar"></i> 查看详细分析
                    </button>
                </div>
            </div>
        </div>
        </div>
    </div>

    <!-- ══════════════ 右侧：图表选项卡 ══════════════ -->
    <div class="chart-col">
        
        <!-- 图表选项卡导航 -->
        <div class="chart-tabs">
            <button class="chart-tab active" data-tab="history" onclick="switchChartTab('history')">
                <i class="fas fa-chart-line"></i> 历史趋势
            </button>
            <button class="chart-tab" data-tab="prediction" onclick="switchChartTab('prediction')">
                <i class="fas fa-crystal-ball"></i> 预测结果
            </button>
            <button class="chart-tab" data-tab="dashboard" onclick="switchChartTab('dashboard')">
                <i class="fas fa-gauge-high"></i> 拥堵状态
            </button>
        </div>

        <!-- 历史趋势图表（默认显示） -->

<script>
// ═══════════════════════════════════════════
// 自定义时间选择器（仿地图样式）
// ═══════════════════════════════════════════
const _CN_WEEK = ['日','一','二','三','四','五','六'];
let _tpDayOff  = 0;          // 0=今天, 1=明天, ...
let _tpHour    = 0;          // 0-23
let _tpNow     = new Date(); // 当前时刻（初始化时固定）

// 生成 7 个星期按钮
function _buildDayBtns() {
    const now  = _tpNow;
    const minDt = new Date(now.getTime() + 60 * 60 * 1000);   // 最早：+1h
    const maxDt = new Date(now.getTime() + 24 * 60 * 60 * 1000); // 最晚：+24h
    const container = document.getElementById('tpDayBtns');
    container.innerHTML = '';

    for (let i = 0; i < 7; i++) {
        const day = new Date(now);
        day.setDate(day.getDate() + i);
        day.setHours(0, 0, 0, 0);

        // 判断该天是否在 24h 窗口内有可选小时
        const dayStart = day.getTime();
        const dayEnd   = dayStart + 24 * 3600 * 1000 - 1;
        const inWindow = dayEnd >= minDt.getTime() && dayStart <= maxDt.getTime();

        const btn = document.createElement('button');
        btn.className = 'tp-day' + (inWindow ? '' : ' disabled');
        const dayName = _CN_WEEK[day.getDay()];
        const todayFlag = (i === 0) ? '<br><span style="font-size:9px;color:inherit;">今天</span>' : '';
        btn.innerHTML = dayName + todayFlag;

        if (inWindow) {
            btn.onclick = () => _selectDay(i);
        }
        if (i === _tpDayOff) btn.classList.add('selected');
        container.appendChild(btn);
    }
}

// 选中某天
function _selectDay(dayOff) {
    _tpDayOff = dayOff;
    _buildDayBtns();
    _constrainSlider();
    _updateDisplay();
    _syncHidden();
    _triggerWeather();
}

// 根据所选天约束滑块范围
function _constrainSlider() {
    const now    = _tpNow;
    const slider = document.getElementById('tpSlider');
    let minH = 0, maxH = 23;

    if (_tpDayOff === 0) {
        // 今天：最小 = now.hour+1（至少1h后）
        minH = now.getHours() + 1;
        if (minH > 23) minH = 23;
    } else {
        // 其他天：判断最大不超过 +24h
        const refDt = new Date(now.getTime() + 24 * 3600 * 1000);
        if (_tpDayOff === 1 && refDt.getDate() !== new Date(now).getDate()) {
            // 明天：最大 = 24h 后的小时
            maxH = refDt.getHours();
        }
    }

    slider.min = minH;
    slider.max = maxH;
    // 保证当前值在范围内
    _tpHour = Math.max(minH, Math.min(maxH, _tpHour));
    slider.value = _tpHour;
    _updateSliderTrack();
}

// 更新滑块填充色
function _updateSliderTrack() {
    const slider = document.getElementById('tpSlider');
    const pct = ((slider.value - slider.min) / (slider.max - slider.min) * 100).toFixed(1) + '%';
    slider.style.setProperty('--pct', pct);
}

// 滑块拖动
function onSliderChange() {
    const slider = document.getElementById('tpSlider');
    _tpHour = parseInt(slider.value);
    _updateSliderTrack();
    _updateDisplay();
    _syncHidden();
    _triggerWeather();
}

// 更新"预测时间 星期X HH:00"显示
function _updateDisplay() {
    const day = new Date(_tpNow);
    day.setDate(day.getDate() + _tpDayOff);
    const dayName = _CN_WEEK[day.getDay()];
    const todayStr = (_tpDayOff === 0) ? '（今天）' : '';
    const h = String(_tpHour).padStart(2, '0');
    document.getElementById('tpDisplay').textContent = `星期${dayName}${todayStr} ${h}:00`;
}

// 同步到隐藏 #datetime input
function _syncHidden() {
    const day = new Date(_tpNow);
    day.setDate(day.getDate() + _tpDayOff);
    day.setHours(_tpHour, 0, 0, 0);
    const pad = n => String(n).padStart(2,'0');
    const val = `${day.getFullYear()}-${pad(day.getMonth()+1)}-${pad(day.getDate())}T${pad(_tpHour)}:00`;
    document.getElementById('datetime').value = val;
    autoFill(); // 同步推断季节/时段
}

// 防抖触发天气请求
let _weatherTimer = null;
function _triggerWeather() {
    const dtVal = document.getElementById('datetime').value;
    if (!dtVal) return;
    fetchWeather(dtVal);
}

// ─────────────────────────────────────────
// 调用后端 /api/weather 自动填充天气（传路段参数）
// ─────────────────────────────────────────
function fetchWeather(dtVal) {
    clearTimeout(_weatherTimer);
    _weatherTimer = setTimeout(() => {
        const badge    = document.getElementById('weatherLoadBadge');
        const srcBadge = document.getElementById('weatherSourceBadge');
        const road     = document.getElementById('road').value;
        badge.style.display = 'inline-block';

        const url = '/api/weather?dt=' + encodeURIComponent(dtVal)
                  + (road ? '&road=' + encodeURIComponent(road) : '');
        fetch(url)
        .then(r => r.json())
        .then(d => {
            badge.style.display = 'none';
            if (!d.success) return;
            const sel = document.getElementById('weather');
            for (let i = 0; i < sel.options.length; i++) {
                if (sel.options[i].value === d.weather) { sel.selectedIndex = i; break; }
            }
            document.getElementById('temperature').value = d.temperature;
            document.getElementById('humidity').value    = d.humidity;
            srcBadge.textContent      = d.source === '实况' ? '☁ 实况天气' : '📅 预报天气';
            srcBadge.style.display    = 'inline-block';
            srcBadge.style.background = d.source === '实况' ? '#e8f4ff' : '#fff3e0';
            srcBadge.style.color      = d.source === '实况' ? '#007bff' : '#e67e00';
        })
        .catch(() => { badge.style.display = 'none'; });
    }, 300);
}

// ─────────────────────────────────────────
// 自动推断季节 & 时段
// ─────────────────────────────────────────
function autoFill() {
    const val = document.getElementById('datetime').value;
    if (!val) return;
    const dt    = new Date(val);
    const month = dt.getMonth() + 1;
    const hour  = dt.getHours();

    let season = 'spring';
    if ([6,7,8].includes(month))        season = 'summer';
    else if ([9,10,11].includes(month)) season = 'autumn';
    else if ([12,1,2].includes(month))  season = 'winter';
    document.getElementById('season').value = season;

    let tp = 'night';
    if (hour >= 6  && hour <= 9)       tp = 'early_peak';
    else if (hour >= 10 && hour <= 16) tp = 'flat';
    else if (hour >= 17 && hour <= 19) tp = 'late_peak';
    document.getElementById('time_period').value = tp;
}

// ─────────────────────────────────────────
// 页面初始化：构建时间选择器并加载天气
// ─────────────────────────────────────────
(function initTP() {
    _tpNow  = new Date();
    _tpDayOff = 0;                          // 默认：今天
    _tpHour   = _tpNow.getHours() + 1;     // 默认：当前小时+1
    if (_tpHour > 23) { _tpHour = 0; _tpDayOff = 1; }  // 跨天处理

    _buildDayBtns();
    _constrainSlider();
    _updateDisplay();
    _syncHidden();
    _triggerWeather();
})();

// 当道路改变时重新拉取天气（区域不同）
document.getElementById('road').addEventListener('change', function() {
    if (this.value) {
        loadTrendChart(this.value);
        _triggerWeather();           // 重新获取路段专属天气
    }
});

// ECharts 实例（全局）
let _trendChart   = null;
let _heatmapChart = null;
let _predictionChart1 = null;
let _predictionChart2 = null;

// 调整所有图表大小
function resizeAllCharts() {
    // 调整趋势图表
    if (_trendChart) {
        try {
            _trendChart.resize();
        } catch (e) {
            console.log('调整趋势图表大小失败:', e);
        }
    }
    
    // 调整热力图
    if (_heatmapChart) {
        try {
            _heatmapChart.resize();
        } catch (e) {
            console.log('调整热力图大小失败:', e);
        }
    }
    
    // 调整预测结果图表
    if (_predictionChart1) {
        try {
            _predictionChart1.resize();
        } catch (e) {
            console.log('调整预测结果图表1大小失败:', e);
        }
    }
    
    if (_predictionChart2) {
        try {
            _predictionChart2.resize();
        } catch (e) {
            console.log('调整预测结果图表2大小失败:', e);
        }
    }
    
    // 调整拥堵状态仪表盘 - 改进版
    resizeDashboardGauge();
    
    // 调整对比分析图表
    const comparisonChartDom = document.getElementById('comparisonChart');
    if (comparisonChartDom && comparisonChartDom.__echarts_instance__) {
        try {
            const comparisonChart = echarts.getInstanceByDom(comparisonChartDom);
            if (comparisonChart) {
                comparisonChart.resize();
            }
        } catch (e) {
            console.log('调整对比分析图表大小失败:', e);
        }
    }
}

// 专门调整拥堵状态仪表盘
function resizeDashboardGauge() {
    const gaugeDom = document.getElementById('dashboardCongestionGauge');
    if (!gaugeDom) return;
    
    // 方法1：通过全局变量查找
    if (window.dashboardGaugeChart) {
        try {
            window.dashboardGaugeChart.resize();
            return;
        } catch (e) {
            console.log('通过全局变量调整仪表盘大小失败:', e);
        }
    }
    
    // 方法2：通过DOM元素查找
    if (gaugeDom.__echarts_instance__) {
        try {
            const gaugeChart = echarts.getInstanceByDom(gaugeDom);
            if (gaugeChart) {
                gaugeChart.resize();
                // 保存到全局变量以便下次使用
                window.dashboardGaugeChart = gaugeChart;
                return;
            }
        } catch (e) {
            console.log('通过DOM元素调整仪表盘大小失败:', e);
        }
    }
    
    // 方法3：通过ECharts全局实例查找
    try {
        const allInstances = echarts.getInstanceByDom(gaugeDom);
        if (allInstances) {
            allInstances.resize();
            window.dashboardGaugeChart = allInstances;
        }
    } catch (e) {
        console.log('通过全局实例调整仪表盘大小失败:', e);
    }
}

// 窗口大小变化时调整图表大小
let resizeTimer;
window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
        resizeAllCharts();
    }, 250);
});

// ─────────────────────────────────────────
// 图表选项卡切换函数
function switchChartTab(tabName) {
    // 更新选项卡按钮状态
    document.querySelectorAll('.chart-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.getAttribute('data-tab') === tabName) {
            tab.classList.add('active');
        }
    });
    
    // 显示对应的内容
    document.querySelectorAll('.chart-tab-content').forEach(content => {
        content.classList.remove('active');
        if (content.id === tabName + 'Charts') {
            content.classList.add('active');
        }
    });
    
    // 如果是预测选项卡且预测结果已生成，渲染预测图表
    if (tabName === 'prediction' && window.lastPredictionData) {
        renderPredictionCharts(window.lastPredictionData);
    }
    
    // 添加切换动画效果
    const activeContent = document.querySelector('.chart-tab-content.active');
    if (activeContent) {
        activeContent.style.animation = 'none';
        setTimeout(() => {
            activeContent.style.animation = 'fadeIn 0.3s ease-out';
        }, 10);
    }
    
    // 延迟调整图表大小，确保容器已经完全显示
    setTimeout(() => {
        resizeAllCharts();
    }, 100);
}

// ─────────────────────────────────────────
// 加载三图函数
// ─────────────────────────────────────────
function loadTrendChart(road) {
    // 显示加载动画
    const loadingHtml = '<i class="fas fa-spinner fa-spin" style="font-size:22px;"></i><span>加载中...</span>';
    document.getElementById('speedPlaceholder').innerHTML   = loadingHtml;
    document.getElementById('heatmapPlaceholder').innerHTML = loadingHtml;

    // 隐藏旧图表
    document.getElementById('trendChart').style.display   = 'none';
    document.getElementById('heatmapChart').style.display = 'none';

    fetch('/api/trend?road=' + encodeURIComponent(road))
    .then(r => r.json())
    .then(data => {
        if (!data.success) {
            document.getElementById('speedPlaceholder').innerHTML = '⚠ 加载失败：' + data.msg;
            return;
        }
        renderDualAxisChart(data);
        renderHeatmap(data);
    })
    .catch(err => {
        document.getElementById('speedPlaceholder').innerHTML = '网络错误，请稍后重试';
        console.error(err);
    });
}

// ─────────────────────────────────────────
// 图表① 双 Y 轴折线图（流量 + 车速）
// ─────────────────────────────────────────
function renderDualAxisChart(data) {
    const ph  = document.getElementById('speedPlaceholder');
    const div = document.getElementById('trendChart');
    ph.style.display  = 'none';
    div.style.display = 'block';

    if (!_trendChart) _trendChart = echarts.init(div);

    const hours     = data.hours.map(h => h + 'h');
    const flows     = data.flows;
    const speeds    = data.speeds;

    // 高峰时段标注
    const peakAreas = {
        data: [
            [{ name:'早高峰', xAxis:'6h' }, { xAxis:'9h' }],
            [{ name:'晚高峰', xAxis:'17h'}, { xAxis:'19h'}]
        ],
        itemStyle: { color: 'rgba(255,152,0,0.12)' },
        label: { show: true, color: '#e67e00', fontSize: 11, position: 'insideTopLeft' }
    };

    _trendChart.setOption({
        backgroundColor: '#fff',
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross' },
            formatter: params => {
                let html = `<b>${params[0].axisValue}</b><br/>`;
                params.forEach(p => {
                    const unit = p.seriesName === '流量指数' ? '' : ' km/h';
                    html += `${p.marker}${p.seriesName}：<b>${p.value}${unit}</b><br/>`;
                });
                return html;
            }
        },
        legend: {
            data: ['流量指数', '平均车速'],
            top: 4, right: 10,
            textStyle: { fontSize: 12 }
        },
        grid: { left: 52, right: 58, top: 36, bottom: 30 },
        xAxis: {
            type: 'category',
            data: hours,
            axisLabel: { fontSize: 11, interval: 1 },
            boundaryGap: false
        },
        yAxis: [
            {
                type: 'value',
                name: '流量',
                nameTextStyle: { fontSize: 11 },
                axisLabel: { fontSize: 11, formatter: v => v.toFixed(2) },
                splitLine: { lineStyle: { color: '#f0f0f0' } }
            },
            {
                type: 'value',
                name: 'km/h',
                nameTextStyle: { fontSize: 11 },
                axisLabel: { fontSize: 11, formatter: v => v.toFixed(0) },
                splitLine: { show: false }
            }
        ],
        series: [
            {
                name: '流量指数',
                type: 'line',
                yAxisIndex: 0,
                data: flows,
                smooth: true,
                symbol: 'circle', symbolSize: 5,
                lineStyle: { width: 2.5, color: '#2196F3' },
                itemStyle: { color: '#2196F3' },
                areaStyle: {
                    opacity: 0.12,
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(33,150,243,0.4)' },
                        { offset: 1, color: 'rgba(33,150,243,0.02)' }
                    ])
                },
                markArea: peakAreas
            },
            {
                name: '平均车速',
                type: 'line',
                yAxisIndex: 1,
                data: speeds,
                smooth: true,
                symbol: 'circle', symbolSize: 5,
                lineStyle: { width: 2.5, color: '#FF9800' },
                itemStyle: { color: '#FF9800' }
            }
        ]
    }, true);
}

// ─────────────────────────────────────────
// 图表② 时间 × 路段热力图
// ─────────────────────────────────────────
function renderHeatmap(data) {
    const ph  = document.getElementById('heatmapPlaceholder');
    const div = document.getElementById('heatmapChart');
    ph.style.display  = 'none';
    div.style.display = 'block';

    if (!_heatmapChart) _heatmapChart = echarts.init(div);

    const roadNames   = data.road_names || [];
    const heatmapRaw  = data.heatmap_data || [];

    // ECharts heatmap 需要 [x, y, value] = [hour_index, road_index, congestion]
    const hmData = heatmapRaw.map(item => [item[0], item[1], item[2]]);

    _heatmapChart.setOption({
        backgroundColor: '#fff',
        tooltip: {
            position: 'top',
            formatter: params => {
                const h = params.data[0];
                const ridx = params.data[1];
                const v = params.data[2];
                const label = v < 1.5 ? '畅通' : v < 2.5 ? '缓行' : v < 3.5 ? '拥堵' : '严重拥堵';
                const rname = roadNames[ridx] || ('路段' + ridx);
                return `${rname}<br/>${h}:00 — <b>${label}</b>（${v}）`;
            }
        },
        grid: { left: 100, right: 60, top: 16, bottom: 30 },
        xAxis: {
            type: 'category',
            data: Array.from({length: 24}, (_, i) => i + 'h'),
            splitArea: { show: true },
            axisLabel: { fontSize: 10, interval: 1 }
        },
        yAxis: {
            type: 'category',
            data: roadNames,
            splitArea: { show: true },
            axisLabel: { fontSize: 10, width: 90, overflow: 'truncate' }
        },
        visualMap: {
            min: 1, max: 4,
            calculable: false,
            orient: 'vertical',
            right: 4, top: 'center',
            itemHeight: 80,
            text: ['重', '轻'],
            textStyle: { fontSize: 10 },
            inRange: {
                color: ['#52c41a', '#faad14', '#fa8c16', '#f5222d']
            }
        },
        series: [{
            type: 'heatmap',
            data: hmData,
            label: { show: false },
            emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
        }]
    }, true);
}

// ─────────────────────────────────────────
// 预测结果图表渲染函数
// ─────────────────────────────────────────
function renderPredictionCharts(data) {
    // 保存预测数据到全局变量
    window.lastPredictionData = data;
    
    // 渲染预测结果对比图
    renderPredictionChart1(data);
    
    // 渲染影响因素分析图
    renderPredictionChart2(data);
}

    // 预测结果对比图
    function renderPredictionChart1(data) {
        const ph = document.getElementById('predictionPlaceholder1');
        const div = document.getElementById('predictionChart1');
        ph.style.display = 'none';
        div.style.display = 'block';
        
        if (!_predictionChart1) _predictionChart1 = echarts.init(div);
        
        // 准备数据 - 使用正确的车流量预测数据
        const categories = ['拥堵指数', '车流量预测', '预测置信度'];
        
        // 获取车流量预测值，如果不存在则使用默认值
        const flowValue = data.predicted_flow || (data.est_speed * 100); // 备用计算：车速 * 100作为车流量估算
        
        const values = [
            data.status,
            flowValue,
            data.confidence
        ];
        
        // 设置颜色
        const colors = ['#dc3545', '#007bff', '#28a745'];
        
        _predictionChart1.setOption({
            backgroundColor: '#fff',
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'shadow'

// ─────────────────────────────────────────
// 执行预测（更新版）
// ─────────────────────────────────────────
function doPredict() {
    const road = document.getElementById('road').value;
    if (!road) { alert('请先选择道路！'); return; }

    const dt  = new Date(document.getElementById('datetime').value || Date.now());
    const hour        = dt.getHours();
    const day_of_week = dt.getDay() === 0 ? 6 : dt.getDay() - 1; // Mon=0

    const payload = {
        road:        road,
        hour:        hour,
        day_of_week: day_of_week,
        weather:     document.getElementById('weather').value,
        temperature: parseFloat(document.getElementById('temperature').value),
        humidity:    parseInt(document.getElementById('humidity').value),
        season:      document.getElementById('season').value,
        time_period: document.getElementById('time_period').value,
    };

    const btn     = document.getElementById('predictBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';

    fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';

        if (!data.success) { alert('预测失败：' + data.msg); return; }

        const panel = document.getElementById('resultPanel');
        panel.classList.add('show');

        // 注意：resSpeed、resConf、guidanceBox 等元素已被移除
        // 现在使用简洁结果展示，这些更新在 updateSimpleResult 函数中完成

        panel.scrollIntoView({behavior:'smooth', block:'nearest'});
        
        // 更新增强的预测结果展示（包含简洁结果和仪表盘内容）
        updateEnhancedPrediction(data, road, dt);
        
        // 渲染预测结果图表
        renderPredictionCharts(data);
        
        // 不再自动切换选项卡，保持当前选项卡
        // 用户可以通过点击选项卡按钮手动切换到其他选项卡
    })
    .catch(err => {
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
        alert('网络错误：' + err);
    });
}

// 保存预测结果
function savePrediction() {
    const road = document.getElementById('road').value;
    const dt = document.getElementById('datetime').value;
    
    // 从基本状态展示中获取数据
    const basicStatusValue = document.getElementById('basicStatusValue').textContent;
    
    // 从预测数据中获取其他信息
    if (!window.lastPredictionData) {
        alert('请先执行预测！');
        return;
    }
    
    const predictionData = {
        road: road,
        time: dt,
        status: basicStatusValue,
        speed: window.lastPredictionData.est_speed + ' km/h',
        confidence: window.lastPredictionData.confidence + '%',
        delay: getDelayEstimate(basicStatusValue),
        savedAt: new Date().toISOString()
    };
    
    // 保存到localStorage
    let savedPredictions = JSON.parse(localStorage.getItem('traffic_predictions') || '[]');
    savedPredictions.push(predictionData);
    localStorage.setItem('traffic_predictions', JSON.stringify(savedPredictions));
    
    alert('预测结果已保存！');
}

function getDelayEstimate(status) {
    const delayMap = {
        '畅通': '0-5 分钟',
        '缓行': '5-15 分钟',
        '拥堵': '15-30 分钟',
        '严重拥堵': '30+ 分钟'
    };
    return delayMap[status] || '-- 分钟';
}

// 对比分析
function comparePrediction() {
    const road = document.getElementById('road').value;
    const dt = document.getElementById('datetime').value;
    
    // 从基本状态展示中获取当前预测数据
    const basicStatusValue = document.getElementById('basicStatusValue').textContent;
    
    // 从预测数据中获取其他信息
    if (!window.lastPredictionData) {
        alert('请先执行预测！');
        return;
    }
    
    const currentPrediction = {
        road: road,
        time: dt,
        status: basicStatusValue,
        speed: window.lastPredictionData.est_speed + ' km/h',
        confidence: window.lastPredictionData.confidence + '%',
        delay: getDelayEstimate(basicStatusValue),
        timestamp: new Date().toISOString()
    };
    
    // 获取已保存的预测
    const savedPredictions = JSON.parse(localStorage.getItem('traffic_predictions') || '[]');
    
    if (savedPredictions.length === 0) {
        alert('暂无已保存的预测记录，请先保存当前预测。');
        return;
    }
    
    // 创建对比模态框
    createComparisonModal(currentPrediction, savedPredictions);
}

// 分享结果
function sharePrediction() {
    const road = document.getElementById('road').value;
    const basicStatusValue = document.getElementById('basicStatusValue').textContent;
    
    // 从预测数据中获取其他信息
    if (!window.lastPredictionData) {
        alert('请先执行预测！');
        return;
    }
    
    const shareText = `【交通预测结果】\n路段：${road}\n拥堵状态：${basicStatusValue}\n预估车速：${window.lastPredictionData.est_speed} km/h\n预测置信度：${window.lastPredictionData.confidence}%\n预测时间：${new Date().toLocaleString('zh-CN')}`;
    
    if (navigator.share) {
        navigator.share({
            title: '交通预测结果',
            text: shareText
        });
    } else {
        // 复制到剪贴板
        navigator.clipboard.writeText(shareText).then(() => {
            alert('预测结果已复制到剪贴板！');
        });
    }
}

// 根据拥堵状态获取颜色
function getStatusColor(status) {
    const statusMap = {
        '畅通': '#28a745',
        '缓行': '#ffc107',
        '拥堵': '#fd7e14',
        '严重拥堵': '#dc3545'
    };
    return statusMap[status] || '#6c757d';
}

// 根据置信度获取颜色
function getConfidenceColor(confidence) {
    if (confidence >= 70) return '#28a745';
    if (confidence >= 50) return '#ffc107';
    return '#dc3545';
}

// 生成分析建议
function generateAnalysisSuggestion(currentPrediction, recentPredictions) {
    if (recentPredictions.length === 0) {
        return '暂无历史预测记录，建议保存当前预测以便后续对比分析。';
    }
    
    // 分析拥堵状态趋势
    let statusCounts = {
        '畅通': 0,
        '缓行': 0,
        '拥堵': 0,
        '严重拥堵': 0
    };
    
    recentPredictions.forEach(pred => {
        const status = pred.status;
        statusCounts[status] = (statusCounts[status] || 0) + 1;
    });
    
    const currentStatus = currentPrediction.status;
    const mostCommonStatus = Object.keys(statusCounts).reduce((a, b) => 
        statusCounts[a] > statusCounts[b] ? a : b
    );
    
    let suggestion = '';
    
    if (currentStatus === mostCommonStatus) {
        suggestion = `当前预测的拥堵状态（${currentStatus}）与历史趋势一致，建议参考历史疏导方案。`;
    } else if (
        (currentStatus === '严重拥堵' && mostCommonStatus === '畅通') ||
        (currentStatus === '拥堵' && mostCommonStatus === '缓行')
    ) {
        suggestion = `当前预测显示拥堵加剧（${currentStatus}），相比历史趋势（${mostCommonStatus}）更为严重，建议加强疏导措施。`;
    } else {
        suggestion = `当前预测拥堵状态为${currentStatus}，历史趋势为${mostCommonStatus}，建议关注路况变化。`;
    }
    
    // 分析置信度趋势
    const avgConfidence = recentPredictions.reduce((sum, pred) => 
        sum + parseInt(pred.confidence), 0) / recentPredictions.length;
    const currentConfidence = parseInt(currentPrediction.confidence);
    
    if (currentConfidence < avgConfidence * 0.8) {
        suggestion += ' 当前预测置信度较低，建议谨慎参考。';
    } else if (currentConfidence > avgConfidence * 1.2) {
        suggestion += ' 当前预测置信度较高，可靠性较强。';
    }
    
    return suggestion;
}

// 渲染对比图表
function renderComparisonChart(currentPrediction, recentPredictions) {
    const chartDom = document.getElementById('comparisonChart');
    if (!chartDom) return;
    
    const chart = echarts.init(chartDom);
    
    // 准备数据
    const allPredictions = [currentPrediction, ...recentPredictions];
    const times = allPredictions.map(pred => 
        new Date(pred.time).toLocaleString('zh-CN', {
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        })
    );
    
    const statusValues = allPredictions.map(pred => {
        const statusMap = {
            '畅通': 1,
            '缓行': 2,
            '拥堵': 3,
            '严重拥堵': 4
        };
        return statusMap[pred.status] || 2;
    });
    
    const confidenceValues = allPredictions.map(pred => parseInt(pred.confidence));
    
    chart.setOption({
        tooltip: {
            trigger: 'axis',
            axisPointer: {
                type: 'cross'
            }
        },
        legend: {
            data: ['拥堵指数', '置信度'],
            top: 10
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '15%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: times,
            axisLabel: {
                rotate: 45,
                fontSize: 11
            }
        },
        yAxis: [
            {
                type: 'value',
                name: '拥堵指数',
                min: 1,
                max: 4,
                axisLabel: {
                    formatter: function(value) {
                        const labelMap = {
                            1: '畅通',
                            2: '缓行',
                            3: '拥堵',
                            4: '严重拥堵'
                        };
                        return labelMap[value] || value;
                    }
                }
            },
            {
                type: 'value',
                name: '置信度',
                min: 0,
                max: 100,
                axisLabel: {
                    formatter: '{value}%'
                }
            }
        ],
        series: [
            {
                name: '拥堵指数',
                type: 'line',
                yAxisIndex: 0,
                data: statusValues,
                smooth: true,
                lineStyle: {
                    width: 3,
                    color: '#dc3545'
                },
                itemStyle: {
                    color: '#dc3545'
                },
                markPoint: {
                    data: [
                        { type: 'max', name: '最大值' },
                        { type: 'min', name: '最小值' }
                    ]
                }
            },
            {
                name: '置信度',
                type: 'line',
                yAxisIndex: 1,
                data: confidenceValues,
                smooth: true,
                lineStyle: {
                    width: 2,
                    color: '#007bff'
                },
                itemStyle: {
                    color: '#007bff'
                }
            }
        ]
    });
}

// 关闭对比模态框
function closeComparisonModal() {
    const modal = document.getElementById('comparisonModal');
    if (modal) {
        modal.remove();
    }
}

// 导出对比结果
function exportComparison() {
    const content = document.getElementById('comparisonContent');
    if (!content) return;
    
    const exportText = `交通预测对比分析报告\n生成时间：${new Date().toLocaleString('zh-CN')}\n\n`;
    
    // 获取表格数据
    const table = content.querySelector('table');
    if (table) {
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cells = row.querySelectorAll('th, td');
            const rowText = Array.from(cells).map(cell => cell.textContent.trim()).join(' | ');
            exportText += rowText + '\n';
        });
    }
    
    // 获取分析建议
    const suggestion = content.querySelector('p');
    if (suggestion) {
        exportText += '\n分析建议：\n' + suggestion.textContent;
    }
    
        // 复制到剪贴板
        navigator.clipboard.writeText(exportText).then(() => {
            alert('对比分析报告已复制到剪贴板！');
        }).catch(err => {
            console.error('复制失败:', err);
            alert('复制失败，请手动复制内容。');
        });
    }
